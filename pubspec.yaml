name: habit_flow
description: "HabitFlow — offline habit tracker with streaks and analytics"
publish_to: 'none'

version: 1.2.0+3

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  intl: ^0.20.2
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2
  share_plus: ^10.1.4
  flutter_local_notifications: ^18.0.1
  flutter_timezone: ^3.0.1
  timezone: ^0.9.4
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  audioplayers: ^6.1.0
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#6366F1"
  adaptive_icon_foreground: "assets/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/sounds/
